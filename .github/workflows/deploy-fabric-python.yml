# ─────────────────────────────────────────────────────────────────────────────
# deploy-fabric-python.yml
# GitHub Actions — Fabric CI/CD (fabric-cicd Python Library Approach)
#
# Approach: Uses the fabric-cicd Python library (FabricWorkspace + publish_all_items)
#           to deploy Fabric item schemas cross-tenant via SPN auth.
#
# No data backup/restore — schema/metadata only.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   TARGET_TENANT_ID       — Azure AD tenant of the target Fabric workspace
#   TARGET_CLIENT_ID       — SPN client ID with Workspace Admin on target
#   TARGET_CLIENT_SECRET   — SPN client secret
#   TARGET_WORKSPACE_ID    — GUID of the target Fabric workspace
# ─────────────────────────────────────────────────────────────────────────────

name: "🚀 Deploy Fabric Schema (Python Library)"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "PROD"
        type: choice
        options:
          - PROD
          - UAT
          - DEV
      item_names:
        description: "Items to deploy (comma-separated, or 'all')"
        required: true
        default: "devsecops_lakehouse"

jobs:
  discover:
    name: "🔍 Discover Items"
    runs-on: ubuntu-latest
    outputs:
      deploy_items: ${{ steps.detect.outputs.deploy_items }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Detect items to deploy
        id: detect
        env:
          ITEM_NAMES: ${{ github.event.inputs.item_names }}
        run: |
          # Run detect_items.py but capture the DEPLOY_ITEMS output for GitHub Actions
          python3 -c "
          import os, sys
          from pathlib import Path
          import yaml

          REPO_ROOT     = Path('.')
          WORKSPACE_SRC = REPO_ROOT / 'workspace-src'
          MANIFEST_FILE = REPO_ROOT / 'deploy_manifest.yml'
          AUTO_CREATED  = {'SQLAnalyticsEndpoint'}

          item_names_env = os.getenv('ITEM_NAMES', 'all').strip()
          requested = [n.strip() for n in item_names_env.split(',') if n.strip()] if item_names_env.lower() != 'all' else ['all']

          manifest = {}
          if MANIFEST_FILE.exists():
              with open(MANIFEST_FILE) as f:
                  data = yaml.safe_load(f)
              manifest = {item['name']: item for item in data.get('items', [])}

          repo_items = {}
          if WORKSPACE_SRC.exists():
              for entry in sorted(WORKSPACE_SRC.iterdir()):
                  if entry.is_dir() and not entry.name.startswith('.'):
                      parts = entry.name.rsplit('.', 1)
                      if len(parts) == 2:
                          repo_items[parts[0]] = parts[1]

          candidates = [n for n, e in manifest.items() if e.get('enabled', True)] if requested == ['all'] else requested
          valid = []
          for name in candidates:
              if name not in repo_items:
                  print(f'[WARN] {name} not found in workspace-src/', file=sys.stderr)
                  continue
              if repo_items[name] in AUTO_CREATED:
                  print(f'[SKIP] {name} is auto-created by Fabric', file=sys.stderr)
                  continue
              valid.append(name)

          deploy_str = ','.join(valid)
          print(f'Items to deploy: {deploy_str}')

          gh_output = os.environ.get('GITHUB_OUTPUT', '')
          if gh_output:
              with open(gh_output, 'a') as f:
                  f.write(f'deploy_items={deploy_str}\n')
          "

  deploy:
    name: "🚀 Deploy: ${{ github.event.inputs.item_names }}"
    runs-on: ubuntu-latest
    needs: discover
    if: needs.discover.outputs.deploy_items != ''
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Deploy Fabric items (fabric-cicd Python library)
        env:
          AZURE_TENANT_ID:     ${{ secrets.TARGET_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.TARGET_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.TARGET_CLIENT_SECRET }}
          TARGET_WORKSPACE_ID: ${{ secrets.TARGET_WORKSPACE_ID }}
          DEPLOY_ENVIRONMENT:  ${{ github.event.inputs.environment }}
          ITEM_NAMES:          ${{ needs.discover.outputs.deploy_items }}
        run: |
          echo "=============================================="
          echo "  fabric-cicd Python Library Deploy"
          echo "  Environment : $DEPLOY_ENVIRONMENT"
          echo "  Items       : $ITEM_NAMES"
          echo "=============================================="
          python deploy.py
